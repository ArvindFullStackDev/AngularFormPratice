<div class="container">

  <div class="row">

    <form [formGroup]="UserFormDetails" (ngSubmit)="onSubmit()">

  

      <div class="mb-3">

        <label class="form-label">
          Name
        </label>
        <input type="text" class="form-control" name="name" placeholder="Enter Name" formControlName="name">

      </div>

      <div class="mb-3">

        <label class="form-label">
          Email
        </label>
        <input type="text" class="form-control" name="email" placeholder="Enter Email" formControlName="email">

      </div>

      <div class="mb-3">

        <label class="form-label">
          Age
        </label>
        <input type="text" class="form-control" name="age" placeholder="Enter Age" formControlName="age">

      </div>

      <div class="mb-3">

        <label class="form-label">
          Address
        </label>
        <input type="text" class="form-control" name="address" placeholder="Enter Address" formControlName="address">

      </div>

      <button type="submit" class="btn btn-primary"> Submit </button>

    </form>
  </div>
</div>>
