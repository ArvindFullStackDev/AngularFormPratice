<h2>List Data</h2>

<div class="container">

  <div class="row">

    <form (ngSubmit)="onSave()">

      <!-- Name -->
      <div class="mb-3">

        <label class="form-label">
          Name
        </label>

        <input type="text"
               class="form-control"
               name="name"
               [(ngModel)]="name"
               placeholder="Enter Name">

      </div>

      <!-- Description -->
      <div class="mb-3">

        <label class="form-label">
          Description
        </label>

        <input type="text"
               class="form-control"
               name="description"
               [(ngModel)]="Description"
               placeholder="Enter Description">

      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn btn-primary">
        Save
      </button>

    </form>

  </div>

</div>
